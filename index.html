<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>CaratLane Price Checker</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f2f0f7; min-height: 100vh; }
    header { background: #8863FB; color: white; padding: 18px 20px 14px; text-align: center; }
    header h1 { font-size: 19px; font-weight: 700; }
    header p  { font-size: 12px; opacity: 0.8; margin-top: 3px; }
    #main-wrap { max-width: 480px; margin: 32px auto 0; padding: 0 20px 40px; }
    .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: #999; margin-bottom: 8px; }
    #input-wrap { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); margin-bottom: 16px; }
    #barcode-input { width: 100%; padding: 14px 16px; font-size: 17px; border: 2px solid #e0d9ff; border-radius: 10px; outline: none; letter-spacing: 1px; text-transform: uppercase; }
    #barcode-input:focus { border-color: #8863FB; }
    #lookup-btn { width: 100%; margin-top: 12px; padding: 16px; background: #8863FB; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 700; cursor: pointer; }
    #lookup-btn:active { opacity: 0.85; }
    #input-hint { font-size: 12px; color: #aaa; margin-top: 10px; text-align: center; line-height: 1.5; }

    #result-card { display: none; background: white; border-radius: 16px; padding: 24px; margin-bottom: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    #result-card.found     { border-top: 4px solid #8863FB; }
    #result-card.not-found { border-top: 4px solid #E53E3E; }

    .meta-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .meta-item { flex: 1; min-width: 120px; }
    .meta-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: #999; margin-bottom: 3px; }
    .meta-value { font-size: 13px; color: #333; font-weight: 500; word-break: break-all; }

    .price-row { display: flex; gap: 12px; margin-bottom: 16px; }
    .price-box { flex: 1; background: #f8f7ff; border-radius: 12px; padding: 16px 12px; text-align: center; }
    .price-box.special { background: #f0ebff; }
    .price-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 6px; }
    .price-value { font-size: 26px; font-weight: 800; color: #333; line-height: 1; }
    .price-box.special .price-value { color: #8863FB; }

    .detail-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .detail-item { flex: 1; min-width: 90px; background: #f8f8f8; border-radius: 10px; padding: 12px; text-align: center; }

    .not-found-msg { font-size: 16px; font-weight: 600; color: #E53E3E; margin-bottom: 6px; }
    .not-found-sub { font-size: 13px; color: #888; }

    #clear-btn { display: block; width: 100%; margin-top: 16px; padding: 13px; background: #f2f0f7; color: #666; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }

    #pos-btn {
      display: block; width: 100%; padding: 17px;
      background: #1a1a2e; color: white;
      border: none; border-radius: 12px;
      font-size: 16px; font-weight: 700;
      cursor: pointer; text-align: center;
      text-decoration: none; margin-bottom: 8px;
    }
    #pos-btn:active { opacity: 0.85; }
  </style>
</head>
<body>

<header>
  <h1>CaratLane Price Checker</h1>
  <p>US Store Price Lookup</p>
</header>

<div id="main-wrap">

  <div id="result-card">
    <div id="state-found" style="display:none">

      <!-- SKU + Barcode -->
      <div class="meta-row">
        <div class="meta-item">
          <div class="meta-label">SKU</div>
          <div class="meta-value" id="val-sku">-</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">Barcode</div>
          <div class="meta-value" id="val-barcode">-</div>
        </div>
      </div>

      <!-- MRP + Special Price -->
      <div class="price-row">
        <div class="price-box">
          <div class="price-label">MRP</div>
          <div class="price-value" id="val-price">-</div>
        </div>
        <div class="price-box special">
          <div class="price-label">Special Price</div>
          <div class="price-value" id="val-special">-</div>
        </div>
      </div>

      <!-- Purity + Diamond Color + Diamond Clarity -->
      <div class="detail-row">
        <div class="detail-item">
          <div class="meta-label">Purity</div>
          <div class="meta-value" id="val-purity">-</div>
        </div>
        <div class="detail-item">
          <div class="meta-label">Diamond Color</div>
          <div class="meta-value" id="val-color">-</div>
        </div>
        <div class="detail-item">
          <div class="meta-label">Diamond Clarity</div>
          <div class="meta-value" id="val-clarity">-</div>
        </div>
      </div>

      <button id="clear-btn" onclick="clearResult()">Check Another</button>
    </div>

    <div id="state-notfound" style="display:none">
      <p class="not-found-msg">Barcode not found</p>
      <p class="not-found-sub" id="val-notfound-barcode"></p>
      <p class="not-found-sub" style="margin-top:4px">Check if item is in the price sheet.</p>
      <button id="clear-btn-nf" onclick="clearResult()" style="display:block;width:100%;margin-top:16px;padding:13px;background:#f2f0f7;color:#666;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;">Try Again</button>
    </div>
  </div>

  <!-- Go to POS button — shown only after found result -->
  <a id="pos-btn" style="display:none" target="_blank">Go to POS</a>

  <div id="input-wrap">
    <p class="section-label">Enter or paste barcode</p>
    <input id="barcode-input" type="text" inputmode="text" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="e.g. AB12XYZ3456" />
    <button id="lookup-btn" onclick="doLookup()">Look Up Price</button>
    <p id="input-hint">Or scan via iOS Shortcut — price loads automatically</p>
  </div>

</div>

function fmt(v) {
  var n = parseFloat(v);
  if (isNaN(n)) return v || '-';
  return '$' + n.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0});
}

function lookup(barcode) {
  return PRICES[barcode.trim().toUpperCase()] || null;
}

function showResult(barcode) {
  if (DISABLED) {
    var card = document.getElementById('result-card');
    card.style.display = 'block';
    card.innerHTML = '<div style="text-align:center;padding:40px 20px"><div style="font-size:48px;margin-bottom:16px">🔒</div><div style="font-size:17px;font-weight:700;color:#4F3267;margin-bottom:8px">Price Checker Unavailable</div><div style="font-size:14px;color:#888">Temporarily disabled. Please check with your manager.</div></div>';
    return;
  }
  var card = document.getElementById('result-card');
  var found = document.getElementById('state-found');
  var notfound = document.getElementById('state-notfound');
  var posBtn = document.getElementById('pos-btn');
  var item = lookup(barcode);

  card.style.display = 'block';
  if (item) {
    card.className = 'found';
    found.style.display = 'block';
    notfound.style.display = 'none';
    document.getElementById('val-sku').textContent     = item.sku || '-';
    document.getElementById('val-barcode').textContent = barcode.toUpperCase();
    document.getElementById('val-price').textContent   = fmt(item.price);
    document.getElementById('val-special').textContent = fmt(item.special);
    document.getElementById('val-purity').textContent  = item.purity || '-';
    document.getElementById('val-color').textContent   = item.color || '-';
    document.getElementById('val-clarity').textContent = item.clarity || '-';
    posBtn.style.display = 'block';
    posBtn.href = 'https://store.caratlane.us/catalogsearch/result/?q=' + encodeURIComponent(barcode) + '&type=barcode';
    posBtn.onclick = function() { trackEvent(barcode.toUpperCase(), item.sku || '', 'pos_click'); };
    trackEvent(barcode.toUpperCase(), item.sku || '', 'scan');
  } else {
    card.className = 'not-found';
    found.style.display = 'none';
    notfound.style.display = 'block';
    document.getElementById('val-notfound-barcode').textContent = barcode.toUpperCase();
    posBtn.style.display = 'none';
  }
}

function doLookup() {
  var val = document.getElementById('barcode-input').value.trim();
  if (val) showResult(val);
}

function clearResult() {
  document.getElementById('result-card').style.display = 'none';
  document.getElementById('pos-btn').style.display = 'none';
  document.getElementById('barcode-input').value = '';
  document.getElementById('barcode-input').focus();
}

// Auto-lookup from URL param ?barcode=
(function() {
  var params = new URLSearchParams(window.location.search);
  var bc = params.get('barcode');
  if (bc) {
    document.getElementById('barcode-input').value = bc;
    showResult(bc);
  }
})();

document.getElementById('barcode-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLookup();
});
</script>
