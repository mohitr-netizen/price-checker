<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>CaratLane Price Checker</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f2f0f7; min-height: 100vh; }
    header { background: #8863FB; color: white; padding: 18px 20px 14px; text-align: center; }
    header h1 { font-size: 19px; font-weight: 700; letter-spacing: 0.3px; }
    header p  { font-size: 12px; opacity: 0.8; margin-top: 3px; }
    #start-wrap { max-width: 480px; margin: 60px auto 0; padding: 0 16px; text-align: center; }
    #start-btn { display: inline-block; width: 100%; padding: 18px; background: #8863FB; color: white; border: none; border-radius: 14px; font-size: 18px; font-weight: 700; cursor: pointer; }
    #start-btn:active { opacity: 0.85; }
    #start-hint { margin-top: 14px; font-size: 13px; color: #888; }
    #scanner-wrap { display: none; max-width: 480px; margin: 24px auto 0; padding: 0 16px; }
    #reader { border-radius: 14px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.15); }
    #scan-status { text-align: center; margin-top: 12px; font-size: 14px; color: #666; }
    #result-card { display: none; max-width: 480px; margin: 24px 16px 0; background: white; border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    #result-card.found     { border-top: 4px solid #8863FB; }
    #result-card.not-found { border-top: 4px solid #E53E3E; }
    #result-card.loading   { border-top: 4px solid #CBD5E0; }
    .meta-row { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .meta-item { flex: 1; min-width: 140px; }
    .meta-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: #999; margin-bottom: 3px; }
    .meta-value { font-size: 13px; color: #333; font-weight: 500; word-break: break-all; }
    .price-row { display: flex; gap: 12px; }
    .price-box { flex: 1; background: #f8f7ff; border-radius: 12px; padding: 16px 12px; text-align: center; }
    .price-box.special { background: #f0ebff; }
    .price-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 6px; }
    .price-value { font-size: 30px; font-weight: 800; color: #333; line-height: 1; }
    .price-box.special .price-value { color: #8863FB; }
    .not-found-msg { font-size: 16px; font-weight: 600; color: #E53E3E; margin-bottom: 6px; }
    .not-found-sub { font-size: 13px; color: #888; }
    .loading-msg { font-size: 15px; color: #888; text-align: center; padding: 8px 0; }
    #scan-again-btn { display: block; width: 100%; margin-top: 20px; padding: 15px; background: #8863FB; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; }
    #scan-again-btn:active { opacity: 0.85; }
  </style>
</head>
<body>

<header>
  <h1>CaratLane Price Checker</h1>
  <p>Scan product QR to get price</p>
</header>

<div id="start-wrap">
  <button id="start-btn" onclick="initScanner()">Tap to Start Scanner</button>
  <p id="start-hint">You will be asked to allow camera access</p>
</div>

<div id="scanner-wrap">
  <div id="reader"></div>
  <p id="scan-status">Initialising camera...</p>
</div>

<div id="result-card">
  <div id="state-loading" style="display:none">
    <p class="loading-msg">Looking up price...</p>
  </div>
  <div id="state-found" style="display:none">
    <div class="meta-row">
      <div class="meta-item">
        <div class="meta-label">SKU</div>
        <div class="meta-value" id="val-sku">-</div>
      </div>
      <div class="meta-item">
        <div class="meta-label">Barcode</div>
        <div class="meta-value" id="val-barcode">-</div>
      </div>
    </div>
    <div class="price-row">
      <div class="price-box">
        <div class="price-label">MRP</div>
        <div class="price-value" id="val-price">-</div>
      </div>
      <div class="price-box special">
        <div class="price-label">Special Price</div>
        <div class="price-value" id="val-special">-</div>
      </div>
    </div>
  </div>
  <div id="state-notfound" style="display:none">
    <p class="not-found-msg">Barcode not found</p>
    <p class="not-found-sub" id="val-notfound-barcode"></p>
    <p class="not-found-sub" style="margin-top:4px">Check if item is in the price sheet.</p>
  </div>
  <button id="scan-again-btn" onclick="scanAgain()">Scan Again</button>
</div>

var qrCode = new Html5Qrcode("reader");
var isScanning = false;

function fmt(n) {
  if (!n && n !== 0) return "-";
  return "$" + Number(n).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function showState(name) {
  ["loading", "found", "notfound"].forEach(function(s) {
    document.getElementById("state-" + s).style.display = s === name ? "block" : "none";
  });
}

function showCard(type) {
  var card = document.getElementById("result-card");
  card.style.display = "block";
  card.className = type;
  document.getElementById("scanner-wrap").style.display = "none";
}

function initScanner() {
  document.getElementById("start-wrap").style.display = "none";
  document.getElementById("scanner-wrap").style.display = "block";
  startScanner();
}

function startScanner() {
  if (isScanning) return;
  document.getElementById("result-card").style.display = "none";
  document.getElementById("scanner-wrap").style.display = "block";
  document.getElementById("scan-status").textContent = "Initialising camera...";

  Html5Qrcode.getCameras()
    .then(function(cameras) {
      if (!cameras.length) throw new Error("No camera found");
      var rear = cameras.find(function(c) { return /back|rear|environment/i.test(c.label); });
      var camId = rear ? rear.id : cameras[cameras.length - 1].id;
      return qrCode.start(
        camId,
        { fps: 12, qrbox: { width: 260, height: 260 }, aspectRatio: 1.0 },
        onScanSuccess,
        function() {}
      );
    })
    .then(function() {
      isScanning = true;
      document.getElementById("scan-status").textContent = "Point at product QR code";
    })
    .catch(function(err) {
      document.getElementById("scan-status").textContent = "Camera error: " + err.message;
    });
}

function onScanSuccess(barcode) {
  if (!isScanning) return;
  isScanning = false;
  qrCode.stop().catch(function() {});
  showCard("loading");
  showState("loading");

  var result = PRICES[barcode.trim().toLowerCase()];

  if (result) {
    showCard("found");
    showState("found");
    document.getElementById("val-sku").textContent     = result.sku      || "-";
    document.getElementById("val-barcode").textContent = result.barcode  || "-";
    document.getElementById("val-price").textContent   = fmt(result.price);
    document.getElementById("val-special").textContent = result.specialPrice ? fmt(result.specialPrice) : "-";
  } else {
    showCard("not-found");
    showState("notfound");
    document.getElementById("val-notfound-barcode").textContent = barcode;
  }
}

function scanAgain() {
  document.getElementById("start-wrap").style.display = "none";
  startScanner();
}
</script>
